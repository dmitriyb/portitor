name: CI

on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "spec/**"
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "spec/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: build, vet, test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      # push-to-main gets the race detector too — pull_request stays the fast
      # gate; -race roughly doubles wall time and is worth paying only once
      # a change has already merged.
      - name: Test (race)
        if: github.event_name == 'push'
        run: go test -race ./...
